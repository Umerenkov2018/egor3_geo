<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ГеоМастер — География 5 класс</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
:root {
  --bg: #0A0A08;
  --card: #111110;
  --card2: #161614;
  --gold: #C9A84C;
  --gold-l: #E8C96A;
  --gold-d: #7A5A1A;
  --green: #4CAF7A;
  --yellow: #E8B84B;
  --red: #E05555;
  --blue: #4a9aba;
  --text: #E8E6DF;
  --text-dim: #6A6860;
  --border: #232321;
  --border2: #2e2e2b;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

/* ─── LAYOUT ─────────────────────────────── */
#app { display:grid; grid-template-rows:54px 1fr 120px; height:100vh; }

/* ─── HEADER ──────────────────────────────── */
#hdr {
  background:var(--card); border-bottom:1px solid var(--border);
  padding:0 14px; display:flex; align-items:center; gap:10px; z-index:1000;
}
.logo { font-size:16px; font-weight:800; color:var(--gold); white-space:nowrap; }
.logo small { color:var(--text-dim); font-weight:400; font-size:11px; margin-left:4px; }

.lv-pill {
  background:linear-gradient(135deg,#3a2800,#5a4010);
  border:1px solid var(--gold-d); color:var(--gold-l);
  border-radius:8px; padding:3px 10px; font-weight:700; font-size:13px;
  white-space:nowrap; cursor:pointer; flex-shrink:0;
}
.lv-pill:hover { border-color:var(--gold); }

.xp-w { flex:1; min-width:60px; max-width:180px; }
.xp-meta { font-size:10px; color:var(--text-dim); display:flex; justify-content:space-between; margin-bottom:3px; }
.xp-track { height:6px; background:var(--border2); border-radius:3px; overflow:hidden; }
.xp-bar { height:100%; background:linear-gradient(90deg,var(--gold-d),var(--gold),var(--gold-l)); border-radius:3px; transition:width .5s; }

.str-pill { background:var(--card2); border:1px solid var(--border2); border-radius:8px; padding:3px 9px; font-size:12px; white-space:nowrap; transition:all .2s; }
.str-pill.s3 { border-color:var(--yellow); color:var(--yellow); }
.str-pill.s5 { border-color:var(--red); color:var(--red); animation:pulse .8s infinite; }

.sep { width:1px; height:26px; background:var(--border2); flex-shrink:0; }

.mr { display:flex; gap:3px; }
.mbtn {
  background:transparent; border:1px solid var(--border2); color:var(--text-dim);
  border-radius:7px; padding:3px 8px; font-size:11px; cursor:pointer; transition:all .15s; white-space:nowrap;
}
.mbtn:hover:not(.on) { color:var(--text); border-color:var(--text-dim); }
.mbtn.on { background:var(--gold); border-color:var(--gold); color:#000; font-weight:700; }

.dr { display:flex; gap:3px; }
.dbtn { background:transparent; border:1px solid var(--border2); color:var(--text-dim); border-radius:7px; padding:2px 7px; font-size:10px; cursor:pointer; transition:all .15s; }
.dbtn[data-d=easy].on  { background:var(--green); border-color:var(--green); color:#000; font-weight:700; }
.dbtn[data-d=medium].on { background:var(--yellow); border-color:var(--yellow); color:#000; font-weight:700; }
.dbtn[data-d=hard].on  { background:var(--red); border-color:var(--red); color:#fff; font-weight:700; }

.rbtn { background:transparent; border:1px solid var(--border2); color:var(--text-dim); border-radius:7px; padding:3px 9px; font-size:11px; cursor:pointer; transition:all .15s; }
.rbtn:hover { border-color:var(--red); color:var(--red); }

/* ─── MAP ─────────────────────────────────── */
#map-c { position:relative; }
#map { height:100%; width:100%; background:#060808; }

/* Grid labels */
.grid-lbl { background:transparent; border:none; pointer-events:none; }
.grid-lbl span {
  font-size:10px; color:rgba(180,180,160,.45); font-weight:500;
  text-shadow:0 0 4px #000,0 0 4px #000; white-space:nowrap;
}
.eq-lbl span { color:rgba(255,100,80,.65); font-size:10px; font-weight:600; }
.pm-lbl span { color:rgba(80,160,255,.65); font-size:10px; font-weight:600; }
.trop-lbl span { color:rgba(230,184,75,.55); font-size:10px; }

/* Floating question */
#mq {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  z-index:500; background:rgba(8,8,6,.93); border:1px solid var(--gold-d);
  border-radius:12px; padding:10px 22px; text-align:center;
  backdrop-filter:blur(10px); pointer-events:none; max-width:440px;
  box-shadow:0 4px 24px rgba(0,0,0,.6);
}
#mq-lbl { font-size:10px; color:var(--text-dim); letter-spacing:.5px; text-transform:uppercase; }
#mq-tgt { font-size:21px; font-weight:800; color:var(--gold-l); line-height:1.2; margin:2px 0; }
#mq-hint { font-size:11px; color:var(--text-dim); }

/* Coords marker */
.qmark { background:transparent; border:none; }
.qmark-inner {
  width:32px; height:32px; border-radius:50%;
  background:rgba(201,168,76,.25); border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; animation:beacon 1.5s infinite;
  box-shadow:0 0 12px rgba(201,168,76,.4);
}
@keyframes beacon {
  0%,100% { box-shadow:0 0 8px rgba(201,168,76,.4); }
  50% { box-shadow:0 0 24px rgba(201,168,76,.7); }
}

/* ─── BOTTOM ──────────────────────────────── */
#btm { background:var(--card); border-top:1px solid var(--border); padding:8px 14px 6px; display:flex; flex-direction:column; gap:6px; }
#b1 { display:flex; align-items:center; gap:12px; min-height:44px; }
#flag-box { flex-shrink:0; display:none; line-height:0; }
#flag-box .flag-wrap {
  width:80px; height:54px; border-radius:6px; overflow:hidden;
  border:1px solid var(--border2); box-shadow:0 2px 10px rgba(0,0,0,.6);
  background:#1a1a18 center/cover no-repeat;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; color:var(--text-dim); letter-spacing:.5px;
}
#q-text { font-size:15px; font-weight:600; }
#q-sub  { font-size:11px; color:var(--text-dim); margin-top:1px; }
#stats-bar { display:flex; gap:12px; margin-left:auto; flex-shrink:0; }
.st { text-align:center; }
.stv { font-size:15px; font-weight:700; color:var(--gold); }
.stl { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; }

#choices { display:flex; gap:6px; flex-wrap:wrap; }
.cbtn { background:var(--card2); border:1px solid var(--border2); color:var(--text); border-radius:7px; padding:5px 13px; font-size:12px; cursor:pointer; transition:all .15s; }
.cbtn:hover:not(.cor):not(.wrg) { border-color:var(--gold); color:var(--gold); }
.cbtn.cor { background:rgba(76,175,122,.15); border-color:var(--green); color:var(--green); pointer-events:none; }
.cbtn.wrg { background:rgba(224,85,85,.12); border-color:var(--red); color:var(--red); pointer-events:none; }

/* ─── FEEDBACK ────────────────────────────── */
#fb {
  position:fixed; top:44%; left:50%; transform:translate(-50%,-50%) scale(.9);
  background:var(--card); border-radius:16px; padding:16px 30px; text-align:center;
  z-index:9999; border:2px solid var(--border2); pointer-events:none;
  opacity:0; transition:opacity .22s,transform .22s;
  box-shadow:0 20px 60px rgba(0,0,0,.8); min-width:180px;
}
#fb.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
#fb.cor { border-color:var(--green); }
#fb.wrg { border-color:var(--red); }
#fb-ico { font-size:40px; line-height:1; }
#fb-msg { font-size:20px; font-weight:800; margin:5px 0 2px; }
#fb-xp  { font-size:14px; color:var(--gold); font-weight:600; }
#fb-inf { font-size:11px; color:var(--text-dim); margin-top:3px; }

/* ─── ACHIEVEMENT TOASTS ──────────────────── */
#ach-box { position:fixed; top:68px; right:14px; z-index:9999; display:flex; flex-direction:column; gap:5px; pointer-events:none; }
.ach-t { background:var(--card); border:1px solid var(--gold-d); border-radius:10px; padding:7px 12px; display:flex; align-items:center; gap:9px; box-shadow:0 4px 20px rgba(201,168,76,.2); animation:slide-in .35s ease; transition:opacity .4s; }
.ach-ico { font-size:20px; }
.ach-ttl { font-weight:700; color:var(--gold); font-size:12px; }
.ach-dsc { font-size:10px; color:var(--text-dim); }

/* ─── LEVEL-UP ────────────────────────────── */
#lv-ov { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:99999; display:none; align-items:center; justify-content:center; }
#lv-card { background:var(--card); border:2px solid var(--gold); border-radius:20px; padding:38px 50px; text-align:center; animation:pop .45s cubic-bezier(.34,1.56,.64,1); box-shadow:0 0 80px rgba(201,168,76,.25); }
.lv-n { font-size:76px; color:var(--gold); line-height:1; }
#lv-rank { font-size:24px; margin:8px 0; }
#lv-desc { color:var(--text-dim); font-size:13px; }
#lv-btn { margin-top:20px; background:linear-gradient(135deg,var(--gold-d),var(--gold)); color:#000; border:none; border-radius:10px; padding:10px 34px; font-size:14px; font-weight:700; cursor:pointer; }

/* ─── STATS OVERLAY ───────────────────────── */
#st-ov { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:99998; display:none; align-items:center; justify-content:center; }
#st-card { background:var(--card); border:1px solid var(--border2); border-radius:16px; padding:24px 28px; width:400px; max-width:95vw; animation:pop .35s ease; max-height:90vh; overflow-y:auto; }
#st-card h2 { font-size:17px; font-weight:700; color:var(--gold); margin-bottom:14px; }
.sg { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.si { background:var(--card2); border-radius:8px; padding:10px; text-align:center; }
.sv { font-size:20px; font-weight:800; color:var(--gold-l); }
.sl { font-size:9px; color:var(--text-dim); text-transform:uppercase; margin-top:2px; }
.ach-grid { display:flex; flex-wrap:wrap; gap:5px; }
.ab { background:var(--card2); border:1px solid var(--border2); border-radius:6px; padding:4px 9px; font-size:11px; display:flex; align-items:center; gap:4px; color:var(--text-dim); }
.ab.e { border-color:var(--gold-d); color:var(--gold); }
#st-close { width:100%; margin-top:14px; background:transparent; border:1px solid var(--border2); color:var(--text-dim); border-radius:8px; padding:7px; cursor:pointer; font-size:12px; }
#st-close:hover { border-color:var(--gold); color:var(--gold); }

/* ─── OCEAN LABELS ────────────────────────── */
.wlbl { background:transparent; border:none; }
.wlbl-i {
  padding:3px 7px; border:1px solid rgba(74,154,186,0); border-radius:5px;
  background:rgba(0,0,0,0); transition:all .2s; cursor:pointer;
  font-size:11px; font-weight:700; color:var(--blue);
  text-shadow:0 0 6px #000,0 0 8px #000; white-space:nowrap;
}
.wlbl-i.ocean { font-size:13px; letter-spacing:.8px; text-transform:uppercase; color:#5aade0; }
.wlbl-i:hover,.wlbl-i.hl { border-color:rgba(74,154,186,.6); background:rgba(0,80,130,.3); }

/* ─── TOOLTIP ─────────────────────────────── */
.leaflet-tooltip.gt { background:var(--card); border:1px solid var(--border2); color:var(--text); border-radius:6px; padding:4px 10px; font-size:12px; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.6); }
.leaflet-tooltip.gt::before { display:none; }

/* ─── ANIMATIONS ──────────────────────────── */
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes slide-in { from{transform:translateX(80px);opacity:0} to{transform:none;opacity:1} }
@keyframes pop      { from{transform:scale(.6);opacity:0} to{transform:none;opacity:1} }
@keyframes float-up { from{opacity:1;transform:translate(-50%,0)} to{opacity:0;transform:translate(-50%,-50px)} }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.leaflet-control-attribution { font-size:9px; opacity:.35; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="hdr">
    <div class="logo">🌍 ГеоМастер<small>5 класс</small></div>
    <div class="lv-pill" id="lv-pill" onclick="openStats()">Ур. 1</div>
    <div class="xp-w">
      <div class="xp-meta"><span id="rank-lbl">🌱 Новичок</span><span id="xp-lbl">0/100 XP</span></div>
      <div class="xp-track"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
    </div>
    <div class="str-pill" id="str-pill">🔥 0</div>
    <div class="sep"></div>
    <div class="mr">
      <button class="mbtn on" data-m="country"  onclick="setMode('country')">🗺 Страны</button>
      <button class="mbtn"    data-m="flag"     onclick="setMode('flag')">🏳 Флаги</button>
      <button class="mbtn"    data-m="capital"  onclick="setMode('capital')">🏙 Столицы</button>
      <button class="mbtn"    data-m="ocean"    onclick="setMode('ocean')">🌊 Моря</button>
      <button class="mbtn"    data-m="coords"   onclick="setMode('coords')">📐 Координаты</button>
    </div>
    <div class="dr">
      <button class="dbtn"    data-d="easy"   onclick="setDiff('easy')">Лёгко</button>
      <button class="dbtn on" data-d="medium" onclick="setDiff('medium')">Средне</button>
      <button class="dbtn"    data-d="hard"   onclick="setDiff('hard')">Сложно</button>
    </div>
    <button class="rbtn" onclick="confirmReset()">↺ Сброс</button>
  </div>

  <!-- MAP -->
  <div id="map-c">
    <div id="map"></div>
    <div id="mq">
      <div id="mq-lbl">Найди на карте:</div>
      <div id="mq-tgt">Загрузка...</div>
      <div id="mq-hint"></div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div id="btm">
    <div id="b1">
      <div id="flag-box"></div>
      <div>
        <div id="q-text">Загрузка карты...</div>
        <div id="q-sub"></div>
      </div>
      <div id="stats-bar">
        <div class="st"><div class="stv" id="s-c">0</div><div class="stl">Верно</div></div>
        <div class="st"><div class="stv" id="s-w">0</div><div class="stl">Ошибок</div></div>
        <div class="st"><div class="stv" id="s-a">—</div><div class="stl">Точность</div></div>
        <div class="st"><div class="stv" id="s-s">0</div><div class="stl">Серия</div></div>
      </div>
    </div>
    <div id="choices"></div>
  </div>
</div>

<!-- FEEDBACK -->
<div id="fb">
  <div id="fb-ico">✓</div>
  <div id="fb-msg"></div>
  <div id="fb-xp"></div>
  <div id="fb-inf"></div>
</div>

<!-- ACHIEVEMENTS -->
<div id="ach-box"></div>

<!-- LEVEL UP -->
<div id="lv-ov">
  <div id="lv-card">
    <div class="lv-n" id="lu-n"></div>
    <div id="lv-rank"></div>
    <div id="lv-desc"></div>
    <button id="lv-btn" onclick="closeLevelUp()">Вперёд!</button>
  </div>
</div>

<!-- STATS -->
<div id="st-ov" onclick="closeStats(event)">
  <div id="st-card">
    <h2>📊 Мой прогресс</h2>
    <div class="sg" id="sg"></div>
    <div style="font-size:11px;color:var(--text-dim);font-weight:600;margin-bottom:7px">ДОСТИЖЕНИЯ</div>
    <div class="ach-grid" id="ag"></div>
    <button id="st-close" onclick="closeStats()">Закрыть</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════

const RANKS = [
  {lv:1,  icon:"🌱", name:"Новичок",          desc:"Ты только начинаешь познавать мир!"},
  {lv:6,  icon:"🔭", name:"Исследователь",    desc:"Горизонты знаний расширяются!"},
  {lv:11, icon:"📍", name:"Географ",          desc:"Ты знаешь карту лучше многих!"},
  {lv:16, icon:"🗺",  name:"Картограф",        desc:"Карты раскрывают тебе свои тайны!"},
  {lv:21, icon:"✈️", name:"Путешественник",   desc:"Весь мир у тебя на ладони!"},
  {lv:31, icon:"🧭", name:"Навигатор",        desc:"Ориентируешься на любой карте!"},
  {lv:41, icon:"🌍", name:"Мастер географии", desc:"Легендарный знаток планеты Земля!"},
];
function getRank(lv) {
  let r = RANKS[0];
  for (const x of RANKS) { if (lv >= x.lv) r = x; else break; }
  return r;
}
function xpForLevel(lv) { return Math.floor(80 + lv*40 + lv*lv*5); }

// ─── INLINE SVG FLAGS (no CDN, works offline/file://) ─────────────────────
(function(){
  const S=c=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2">${c}</svg>`;
  const rx=(y,h,c)=>`<rect y="${y}" width="3" height="${h}" fill="${c}"/>`;
  const ry=(x,w,c)=>`<rect x="${x}" width="${w}" height="2" fill="${c}"/>`;
  const rr=(x,y,w,h,c)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${c}"/>`;
  const cl=(cx,cy,r,c)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c}"/>`;
  const pg=(p,c)=>`<polygon points="${p}" fill="${c}"/>`;
  window.FLAGS={
    ru:S(rx(0,.667,'#fff')+rx(.667,.666,'#0055A4')+rx(1.333,.667,'#CC0000')),
    fr:S(ry(0,1,'#002395')+ry(1,1,'#fff')+ry(2,1,'#ED2939')),
    de:S(rx(0,.667,'#000')+rx(.667,.666,'#DD0000')+rx(1.333,.667,'#FFCE00')),
    gb:S(rr(0,0,3,2,'#012169')+`<path d="M0,0 L3,2M3,0 L0,2" stroke="#fff" stroke-width=".5"/><path d="M0,0 L3,2M3,0 L0,2" stroke="#C8102E" stroke-width=".28"/>`+rr(1.25,0,.5,2,'#fff')+rx(.75,.5,'#fff')+rr(1.35,0,.3,2,'#C8102E')+rx(.85,.3,'#C8102E')),
    it:S(ry(0,1,'#009246')+ry(1,1,'#fff')+ry(2,1,'#CE2B37')),
    es:S(rx(0,.5,'#AA151B')+rx(.5,1,'#F1BF00')+rx(1.5,.5,'#AA151B')),
    pt:S(ry(0,1.05,'#006600')+ry(1.05,1.95,'#FF0000')+cl(1.05,1,.36,'#FFD700')+cl(1.05,1,.25,'#006600')),
    pl:S(rx(0,1,'#fff')+rx(1,1,'#DC143C')),
    ua:S(rx(0,1,'#005BBB')+rx(1,1,'#FFD500')),
    se:S(rr(0,0,3,2,'#006AA7')+rr(.9,0,.4,2,'#FECC02')+rx(.8,.4,'#FECC02')),
    no:S(rr(0,0,3,2,'#EF2B2D')+rr(.8,0,.6,2,'#fff')+rx(.7,.6,'#fff')+rr(.9,0,.4,2,'#002868')+rx(.8,.4,'#002868')),
    fi:S(rr(0,0,3,2,'#fff')+rr(.8,0,.45,2,'#003580')+rx(.775,.45,'#003580')),
    gr:S(rx(0,2,'#0D5EAF')+[0,1,2,3,4,5,6,7,8].map(i=>rx(i*.222,.111,i%2?'#fff':'#0D5EAF')).join('')+rr(0,0,.667,.667,'#0D5EAF')+rr(.267,0,.133,.667,'#fff')+rr(0,.267,.667,.133,'#fff')),
    ro:S(ry(0,1,'#002B7F')+ry(1,1,'#FCD116')+ry(2,1,'#CE1126')),
    hu:S(rx(0,.667,'#CE2939')+rx(.667,.666,'#fff')+rx(1.333,.667,'#477050')),
    cz:S(rr(0,0,3,1,'#fff')+rx(1,1,'#D7141A')+pg('0,0 1.5,1 0,2','#11457E')),
    at:S(rx(0,.667,'#ED2939')+rx(.667,.666,'#fff')+rx(1.333,.667,'#ED2939')),
    ch:S(rr(0,0,3,2,'#FF0000')+rr(1.2,.4,.6,1.2,'#fff')+rr(.9,.7,1.2,.6,'#fff')),
    nl:S(rx(0,.667,'#AE1C28')+rx(.667,.666,'#fff')+rx(1.333,.667,'#21468B')),
    be:S(ry(0,1,'#000')+ry(1,1,'#FAD80C')+ry(2,1,'#EF3340')),

function showFlag(iso2) {
  const fbox = document.getElementById("flag-box");
  const svg = window.FLAGS[(iso2 || "").toLowerCase()];
  if (svg) {
    const uri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    fbox.innerHTML = `<div class="flag-wrap" style="background:url('${uri}') center/contain no-repeat #1a1a18"></div>`;
  } else {
    fbox.innerHTML = `<div class="flag-wrap">${(iso2||"").toUpperCase()}</div>`;
  }
  fbox.style.display = "block";
}

function hideFlag() {
  const fbox = document.getElementById("flag-box");
  fbox.innerHTML = "";
  fbox.style.display = "none";
}

// Coords formatter
function fmtCoord(lat, lng) {
  const la = Math.abs(Math.round(lat)), ld = lat >= 0 ? "с.ш." : "ю.ш.";
  const lo = Math.abs(Math.round(lng)), od = lng >= 0 ? "в.д." : "з.д.";
  return `${la}° ${ld},  ${lo}° ${od}`;
}

// ─── COORDINATE GRID ───────────────────────────────────────────────────────

function setupGrid() {
  const opt = (color, w, dash, opacity) => ({ color, weight:w, dashArray:dash, opacity, interactive:false });

  // 30° grid lines (very dim)
  for (let lat = -90; lat <= 90; lat += 30) {
    if (lat === 0 || lat === 23.5 || lat === -23.5 || lat === 66.5 || lat === -66.5) continue;
    L.polyline([[lat,-200],[lat,200]], opt("#fff",0.4,"4 6",0.18)).addTo(map);
  }
  for (let lng = -180; lng <= 180; lng += 30) {
    if (lng === 0) continue;
    L.polyline([[-90,lng],[90,lng]], opt("#fff",0.4,"4 6",0.18)).addTo(map);
  }

  // Tropics & Arctic circles
  const tropicOpt = opt("#E8B84B",0.7,"6 5",0.38);
  L.polyline([[23.5,-200],[23.5,200]], tropicOpt).addTo(map);
  L.polyline([[-23.5,-200],[-23.5,200]], tropicOpt).addTo(map);
  const arcticOpt = opt("#5aade0",0.7,"6 5",0.3);
  L.polyline([[66.5,-200],[66.5,200]], arcticOpt).addTo(map);
  L.polyline([[-66.5,-200],[-66.5,200]], arcticOpt).addTo(map);

  // Prime meridian
  L.polyline([[-90,0],[90,0]], opt("#4a8eff",1.4,"",0.45)).addTo(map);

  // Equator
  L.polyline([[0,-200],[0,200]], opt("#ff6050",1.6,"",0.55)).addTo(map);

  // Labels — added as DivIcon markers (non-interactive)
  function gridLabel(lat, lng, html, cls) {
    L.marker([lat, lng], {
      icon: L.divIcon({ className:`grid-lbl${cls?" "+cls:""}`, html:`<span>${html}</span>`, iconSize:[120,16], iconAnchor:[0,8] }),
      interactive:false, keyboard:false,
    }).addTo(map);
  }

  gridLabel(1, 2,   "ЭКВАТОР",        "eq-lbl");
  gridLabel(1, 32,  "0°",             "pm-lbl");
  gridLabel(24.5, 135, "Тропик Рака ✦",  "trop-lbl");
  gridLabel(-22.5, 135,"Тропик Козерога ✦","trop-lbl");
  gridLabel(67, 130,"Северный полярный круг","trop-lbl");
  gridLabel(-65.5, 130,"Южный полярный круг","trop-lbl");
  gridLabel(30, 2,  "30° с.ш.", "");
  gridLabel(60, 2,  "60° с.ш.", "");
  gridLabel(-30, 2, "30° ю.ш.", "");
  gridLabel(-60, 2, "60° ю.ш.", "");
  gridLabel(1, 30,  "30° в.д.", "");
  gridLabel(1, 60,  "60° в.д.", "");
  gridLabel(1, 90,  "90° в.д.", "");
  gridLabel(1, 120, "120° в.д.", "");
  gridLabel(1, 150, "150° в.д.", "");
  gridLabel(1, -30, "30° з.д.", "");
  gridLabel(1, -60, "60° з.д.", "");
  gridLabel(1, -90, "90° з.д.", "");
  gridLabel(1,-120, "120° з.д.", "");
  gridLabel(1,-150, "150° з.д.", "");
}

// GEOJSON LAYER
// ═══════════════════════════════════════════════════

let geoLayer = null;
let geoLoaded = false;
let currentQ = null;
let locked = false;
let wMarkers = [];
let coordMarker = null;

async function loadMap() {
  setupGrid();
  try {
    const res = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
    const topo = await res.json();
    const geo = topojson.feature(topo, topo.objects.countries);

    geoLayer = L.geoJSON(geo, {
      style: () => ({ fillColor:"#1a2818", fillOpacity:.75, color:"#2d3d2d", weight:.7, opacity:.9 }),
      onEachFeature: (feature, layer) => {
        const numId = String(feature.id).padStart(3,"0");
        const en = ISO_NUM[numId];
        if (en) { layer._en = en; layer._cd = BY_EN[en] || null; }
        layer.on({ mouseover(e){onHover(e,layer)}, mouseout(e){onOut(e,layer)}, click(e){onClick(e,layer)} });
      },
    }).addTo(map);

    geoLoaded = true;
    startGame();
  } catch(e) {
    console.error(e);
    document.getElementById("mq-tgt").textContent = "Ошибка загрузки";
    document.getElementById("q-text").textContent = "Нет соединения. Перезагрузите страницу.";
  }
}

function onHover(e, layer) {
  if (S.mode === "ocean") return;
  if (!layer._lit) layer.setStyle({ fillColor:"#7a6030", fillOpacity:.55, color:"#b09040", weight:1 });
  const cd = layer._cd;
  if (cd) {
    layer.bindTooltip(`<b>${cd.ru}</b><br><small style="color:var(--text-dim)">${cd.continent}</small>`, {className:"gt",sticky:true}).openTooltip(e.latlng);
  }
}
function onOut(e, layer) {
  layer.closeTooltip();
  if (!layer._lit) geoLayer && geoLayer.resetStyle(layer);
}
function onClick(e, layer) {
  if (locked || !currentQ || S.mode === "ocean") return;
  answerCountry(layer._en, layer);
}
function resetAll() {
  if (!geoLayer) return;
  geoLayer.eachLayer(l => { l._lit = false; geoLayer.resetStyle(l); });
}

function clearWater() { wMarkers.forEach(m => map.removeLayer(m)); wMarkers = []; }

function spawnWater() {
  clearWater();
  getWaterPool().forEach(wb => {
    const isOcean = wb.type === "ocean";
    const icon = L.divIcon({
      className:`wlbl`,
      html:`<div class="wlbl-i${isOcean?" ocean":""}" id="wl-${wb.id}">${wb.ru}</div>`,
      iconSize:[200, isOcean?24:20], iconAnchor:[100, isOcean?12:10],
    });
    const m = L.marker([wb.lat, wb.lng], { icon, zIndexOffset:200 })
      .on("click", () => { if(!locked) answerWater(wb.id); })
      .addTo(map);
    wMarkers.push(m);
  });
}

// ═══════════════════════════════════════════════════
// POOLS
// ═══════════════════════════════════════════════════

function getPool() {
  const d = S.diff==="easy"?1:S.diff==="medium"?2:3;
  return COUNTRIES.filter(c=>c[9]<=d);
}
function getWaterPool() {
  const easy = ["pacific","atlantic","indian","arctic","southern","medit","black","red","caspian"];
  const med  = [...easy,"arabian","caribbean","bering","japan","north","baltic"];
  if (S.diff==="easy") return WATER.filter(w=>easy.includes(w.id));
  if (S.diff==="medium") return WATER.filter(w=>med.includes(w.id));
  return WATER;
}
function rnd(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function pickWrong(correct, pool, n=3) {
  const others = pool.filter(c=>c[1]!==correct.ru);
  const res = [], used = new Set();
  while (res.length<n && others.length>0) {
    const i = Math.floor(Math.random()*others.length);
    const c = others.splice(i,1)[0];
    if (!used.has(c[1])) { used.add(c[1]); res.push(BY_EN[c[2]]||{ru:c[1]}); }
  }
  return res;
}

// GAME FLOW
// ═══════════════════════════════════════════════════

function startGame() { restoreUI(); updateXP(); updateStats(); nextQ(); }

function clearCoordMarker() {
  if (coordMarker) { map.removeLayer(coordMarker); coordMarker = null; }
}

function nextQ() {
  locked = false;
  document.getElementById("choices").innerHTML = "";
  resetAll();
  clearCoordMarker();
  hideFlag();

  const mode = S.mode;
  trackMode(mode);

  // ── OCEAN ──────────────────────────────────────────
  if (mode === "ocean") {
    clearWater();
    const wb = rnd(getWaterPool());
    currentQ = { type:"ocean", wb };

    document.getElementById("mq-lbl").textContent = wb.type==="ocean" ? "Найди океан:" : "Найди море / залив:";
    document.getElementById("mq-tgt").textContent = wb.ru;
    document.getElementById("mq-hint").textContent = "Нажми на правильное название на карте";
    document.getElementById("q-text").textContent = `Найди: ${wb.ru}`;
    document.getElementById("q-sub").textContent = wb.type==="ocean" ? "Океан" : "Море или залив";

    spawnWater();
    map.flyTo([20,10], 2, {duration:0.8});
    return;
  }
  clearWater();

  const pool = getPool();
  const pick = rnd(pool);
  const cd   = BY_EN[pick[2]];

  // ── COUNTRY ────────────────────────────────────────
  if (mode === "country") {
    currentQ = { type:"country", cd };
    map.flyTo([cd.lat, cd.lng], 3.5, {duration:1.1});

    document.getElementById("mq-lbl").textContent  = "Найди страну:";
    document.getElementById("mq-tgt").textContent  = cd.ru;
    document.getElementById("mq-hint").textContent = cd.continent;
    document.getElementById("q-text").textContent  = `Кликни на страну: ${cd.ru}`;
    document.getElementById("q-sub").textContent   = cd.continent;
  }

  // ── FLAG ───────────────────────────────────────────
  else if (mode === "flag") {
    currentQ = { type:"flag", cd };
    map.flyTo([cd.lat, cd.lng], 3.5, {duration:1.1});

    showFlag(cd.iso2);

    document.getElementById("mq-lbl").textContent  = "Определи страну по флагу:";
    document.getElementById("mq-tgt").textContent  = "?";
    document.getElementById("mq-hint").textContent = "Нажми на страну или выбери ответ";
    document.getElementById("q-text").textContent  = "Найди страну с этим флагом";
    document.getElementById("q-sub").textContent   = cd.continent;

    const choices = [cd, ...pickWrong(cd, pool)].sort(()=>Math.random()-.5);
    renderChoices(choices, cd);
  }

  // ── CAPITAL ────────────────────────────────────────
  else if (mode === "capital") {
    currentQ = { type:"capital", cd };
    map.flyTo([cd.lat, cd.lng], 4, {duration:1.1});

    document.getElementById("mq-lbl").textContent  = "Столица этой страны:";
    document.getElementById("mq-tgt").textContent  = cd.capRu;
    document.getElementById("mq-hint").textContent = "Найди страну на карте";
    document.getElementById("q-text").textContent  = `Найди страну со столицей: ${cd.capRu}`;
    document.getElementById("q-sub").textContent   = cd.continent;
  }

  // ── COORDINATES ────────────────────────────────────
  else if (mode === "coords") {
    const subtype = Math.random() < 0.5 ? "find" : "name";
    currentQ = { type:"coords", subtype, cd };

    // sub "find" → show marker, user clicks country
    if (subtype === "find") {
      // Place beacon at country center
      const qIcon = L.divIcon({ className:"qmark", html:`<div class="qmark-inner">?</div>`, iconSize:[32,32], iconAnchor:[16,16] });
      coordMarker = L.marker([cd.lat, cd.lng], { icon:qIcon, zIndexOffset:500, interactive:false }).addTo(map);

      map.flyTo([cd.lat, cd.lng], 3, {duration:1.1});

      const coords = fmtCoord(cd.lat, cd.lng);
      document.getElementById("mq-lbl").textContent  = "Кликни на страну с координатами:";
      document.getElementById("mq-tgt").textContent  = coords;
      document.getElementById("mq-hint").textContent = "Центр страны отмечен маркером";
      document.getElementById("q-text").textContent  = `Координаты: ${coords}`;
      document.getElementById("q-sub").textContent   = "Кликни на правильную страну";
    }

    // sub "name" → show country, pick correct coords
    else {
      map.flyTo([cd.lat, cd.lng], 3, {duration:1.1});

      // 4 coord choices: correct + 3 wrong
      const wrongCountries = pickWrong(cd, pool, 3);
      const options = [
        { country: cd,   coords: fmtCoord(cd.lat, cd.lng),  correct: true },
        ...wrongCountries.map(wc => ({ country: wc, coords: fmtCoord(wc.lat||0, wc.lng||0), correct: false })),
      ].sort(()=>Math.random()-.5);

      currentQ.options = options;

      document.getElementById("mq-lbl").textContent  = "Координаты какой страны:";
      document.getElementById("mq-tgt").textContent  = cd.ru;
      document.getElementById("mq-hint").textContent = "Выбери правильные координаты";
      document.getElementById("q-text").textContent  = `Координаты страны: ${cd.ru}`;
      document.getElementById("q-sub").textContent   = cd.continent;

      renderCoordChoices(options);
    }
  }
}

function renderChoices(choices, correct) {
  const box = document.getElementById("choices");
  choices.forEach(c => {
    const b = document.createElement("button");
    b.className = "cbtn";
    b.textContent = c.ru;
    b.onclick = () => {
      if (locked) return;
      if (c.ru === correct.ru) {
        b.classList.add("cor");
        correctAnswer();
      } else {
        b.classList.add("wrg");
        box.querySelectorAll(".cbtn").forEach(x => { if (x.textContent === correct.ru) x.classList.add("cor"); });
        wrongAnswer(correct);
      }
      locked = true;
    };
    box.appendChild(b);
  });
}

function renderCoordChoices(options) {
  const box = document.getElementById("choices");
  options.forEach(opt => {
    const b = document.createElement("button");
    b.className = "cbtn";
    b.textContent = opt.coords;
    b.onclick = () => {
      if (locked) return;
      if (opt.correct) {
        b.classList.add("cor");
        correctAnswer(true);
      } else {
        b.classList.add("wrg");
        box.querySelectorAll(".cbtn").forEach(x => {
          if (x.textContent === currentQ.options.find(o=>o.correct).coords) x.classList.add("cor");
        });
        wrongAnswer(currentQ.cd);
      }
      locked = true;
    };
    box.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════
// ANSWERS
// ═══════════════════════════════════════════════════

function answerCountry(en, layer) {
  if (!currentQ || locked) return;
  const target = currentQ.cd;
  if (!target) return;

  if (en === target.en) {
    layer._lit = true;
    layer.setStyle({ fillColor:"#4CAF7A", fillOpacity:.7, color:"#4CAF7A", weight:1.5 });
    if (S.mode === "coords") correctAnswer(true);
    else correctAnswer();
  } else {
    layer._lit = true;
    layer.setStyle({ fillColor:"#E05555", fillOpacity:.5, color:"#E05555", weight:1.5 });
    geoLayer && geoLayer.eachLayer(l => {
      if (l._en === target.en) {
        l._lit = true;
        l.setStyle({ fillColor:"#4CAF7A", fillOpacity:.7, color:"#4CAF7A", weight:2 });
      }
    });
    wrongAnswer(target);
  }
  locked = true;
}

function answerWater(id) {
  if (!currentQ || locked) return;
  locked = true;
  if (id === currentQ.wb.id) correctAnswer();
  else wrongAnswer(currentQ.wb);
}

// ═══════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════

const XP_BASE = { easy:8, medium:15, hard:25 };
const STR_MULT = [1,1,1,1.5,1.5,2,2,2,2.5,2.5,3];

function correctAnswer(isCoords) {
  S.cor++;
  S.str++;
  if (S.str > S.maxStr) S.maxStr = S.str;
  if (S.diff === "hard") S.hardCor++;
  if (isCoords) S.coordCor++;

  const base = XP_BASE[S.diff];
  const mult = STR_MULT[Math.min(S.str, STR_MULT.length-1)];
  const earned = Math.round(base * mult);
  const ms = mult > 1 ? ` ×${mult} серия!` : "";

  gainXP(earned);
  updateStats();
  showFB(true, "Правильно!", `+${earned} XP${ms}`);
  checkAchs();
  save();
  setTimeout(nextQ, 1700);
}

function wrongAnswer(target) {
  S.str = 0; S.wrg++;
  updateStats();
  const info = target ? `Правильно: ${target.ru || target.capRu || ""}` : "";
  showFB(false, "Неверно!", info);
  checkAchs();
  save();
  setTimeout(nextQ, 2200);
}

function gainXP(n) {
  S.xp += n;
  floatXP(`+${n}`);
  let leveled = false;
  while (S.xp >= xpForLevel(S.lv)) { S.xp -= xpForLevel(S.lv); S.lv++; leveled = true; }
  if (leveled) setTimeout(showLevelUp, 400);
  updateXP();
}

function floatXP(txt) {
  const el = document.createElement("div");
  el.textContent = txt;
  el.style.cssText = "position:fixed;left:50%;top:54%;font-size:18px;font-weight:800;pointer-events:none;z-index:8000;color:var(--gold-l);text-shadow:0 0 10px rgba(201,168,76,.5);animation:float-up 1.1s ease forwards";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ═══════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════

function updateXP() {
  const need = xpForLevel(S.lv);
  document.getElementById("xp-bar").style.width = (S.xp/need*100)+"%";
  document.getElementById("xp-lbl").textContent = `${S.xp}/${need} XP`;
  document.getElementById("lv-pill").textContent = `Ур. ${S.lv}`;
  const r = getRank(S.lv);
  document.getElementById("rank-lbl").textContent = `${r.icon} ${r.name}`;
}

function updateStats() {
  document.getElementById("s-c").textContent = S.cor;
  document.getElementById("s-w").textContent = S.wrg;
  const tot = S.cor+S.wrg;
  document.getElementById("s-a").textContent = tot>0 ? Math.round(S.cor/tot*100)+"%" : "—";
  document.getElementById("s-s").textContent = S.str;
  const sp = document.getElementById("str-pill");
  sp.textContent = `🔥 ${S.str}`;
  sp.className = "str-pill"+(S.str>=5?" s5":S.str>=3?" s3":"");
}

let fbT = null;
function showFB(ok, msg, xp) {
  const el = document.getElementById("fb");
  document.getElementById("fb-ico").textContent = ok ? "✓" : "✗";
  document.getElementById("fb-msg").textContent = msg;
  document.getElementById("fb-msg").style.color = ok ? "var(--green)" : "var(--red)";
  document.getElementById("fb-xp").textContent  = xp;
  document.getElementById("fb-inf").textContent = "";
  el.className = "show "+(ok?"cor":"wrg");
  clearTimeout(fbT);
  fbT = setTimeout(() => el.className = "", 1500);
}

function showLevelUp() {
  const r = getRank(S.lv);
  document.getElementById("lu-n").textContent = S.lv;
  document.getElementById("lv-rank").textContent = `${r.icon} ${r.name}`;
  document.getElementById("lv-desc").textContent = r.desc;
  document.getElementById("lv-ov").style.display = "flex";
}
function closeLevelUp() { document.getElementById("lv-ov").style.display = "none"; }

function checkAchs() {
  ACHS.forEach(a => {
    if (!S.achs.includes(a.id) && a.check(S)) {
      S.achs.push(a.id);
      toastAch(a);
    }
  });
}
function toastAch(a) {
  const box = document.getElementById("ach-box");
  const el = document.createElement("div");
  el.className = "ach-t";
  el.innerHTML = `<div class="ach-ico">${a.ico}</div><div><div class="ach-ttl">🏆 ${a.title}</div><div class="ach-dsc">${a.desc}</div></div>`;
  box.appendChild(el);
  setTimeout(() => { el.style.opacity="0"; setTimeout(()=>el.remove(),400); }, 3500);
}

function openStats() {
  const tot = S.cor+S.wrg;
  const acc = tot>0 ? Math.round(S.cor/tot*100)+"%" : "—";
  document.getElementById("sg").innerHTML = `
    <div class="si"><div class="sv">${S.lv}</div><div class="sl">Уровень</div></div>
    <div class="si"><div class="sv">${S.xp}</div><div class="sl">XP (до след.)</div></div>
    <div class="si"><div class="sv">${S.cor}</div><div class="sl">Правильных</div></div>
    <div class="si"><div class="sv">${S.wrg}</div><div class="sl">Ошибок</div></div>
    <div class="si"><div class="sv">${acc}</div><div class="sl">Точность</div></div>
    <div class="si"><div class="sv">${S.maxStr}</div><div class="sl">Макс. серия</div></div>
  `;
  document.getElementById("ag").innerHTML = ACHS.map(a => {
    const e = S.achs.includes(a.id);
    return `<div class="ab${e?" e":""}" title="${a.desc}">${a.ico} ${a.title}</div>`;
  }).join("");
  document.getElementById("st-ov").style.display = "flex";
}
function closeStats(e) {
  if (!e || e.target===document.getElementById("st-ov"))
    document.getElementById("st-ov").style.display = "none";
}

function setMode(m) {
  S.mode = m;
  document.querySelectorAll(".mbtn").forEach(b => b.classList.toggle("on", b.dataset.m===m));
  save();
  if (geoLoaded) { clearWater(); clearCoordMarker(); nextQ(); }
}
function setDiff(d) {
  S.diff = d;
  document.querySelectorAll(".dbtn").forEach(b => b.classList.toggle("on", b.dataset.d===d));
  save();
  if (geoLoaded) nextQ();
}
function confirmReset() {
  if (confirm("Сбросить весь прогресс? XP, уровень и статистика будут обнулены.")) {
    const mode=S.mode, diff=S.diff;
    S = { ...DEF, mode, diff };
    save(); updateXP(); updateStats();
    if (geoLoaded) nextQ();
  }
}
function restoreUI() {
  document.querySelectorAll(".mbtn").forEach(b => b.classList.toggle("on", b.dataset.m===S.mode));
  document.querySelectorAll(".dbtn").forEach(b => b.classList.toggle("on", b.dataset.d===S.diff));
}

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
loadMap();
</script>
</body>
</html>
